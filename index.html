            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Questions 35 through 38:</b> Listen to two students discussing a trip they took to a science museum.<br><br><b>(woman)</b> I must admit that when Dr. Carver mentioned that we had to visit the science museum, I sure wasn't looking forward to it.<br><b>(man)</b> I know what you mean. I remember science museums as boring places filled with stuffed birds and glass display cases of rocks.<br><b>(woman)</b> Yeah. I definitely like these hands-on exhibits better.<br><b>(man)</b> It's really a great way to understand some of the concepts we're learning in class. They stick in your mind when you can see them in action and work with them.<br><b>(woman)</b> Uh-huh. Like that section where you try to figure out who committed the murder by analyzing evidence the way a police lab would.<br><b>(man)</b> Right. Did you try the experiment where you compare the perfumes of all the suspects to the perfume found at the scene of the crime?<br><b>(woman)</b> The one where you smelled what was in a bottle and then answered questions about the smell on a computer?<br><b>(man)</b> Yeah. It was interesting to see the chart of all the different smells and how you classified them, and then to see the graphs of the different perfumes according to their chemical composition.<br><b>(woman)</b> That was really amazing. I never understood how that chemical separation technique worked when Dr. Carver talked about it in class.<br><b>(man)</b> But from the analysis we did, I can see how useful it can be to separate out the different chemicals.<br><b>(woman)</b> There was so much more that I wanted to see and to try out.<br><b>(man)</b> Yeah, I'm looking forward to going back.</div>38. What do the speakers plan to do in the future?", a:"d", exp:"Di akhir percakapan, pria tersebut mengatakan 'I'm looking forward to going back' (Saya menantikan untuk kembali lagi), menunjukkan rencana mereka untuk kembali ke museum tersebut.", o:{a:"Visit a police lab.", b:"Analyze other perfumes.", c:"Talk to Dr. Carver about their observations.", d:"Return to the museum."} },
            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Part C</b><br><b>Questions 39 through 42:</b> Listen to a tour guide at a wildlife park in central Illinois.<br><br><b>(man)</b> Thank you for choosing to spend a day with us here at Prairie Animal Park. Before you set off to see the animals, let me explain a little bit about the park. Prairie Animal Park is a nonprofit organization and gets no government money. The money from your admission ticket goes entirely to caring for the park and its animals. Most of the people who work here are volunteers. The park covers 2,400 [two thousand four hundred] acres. It was created by a group of people interested in restoring some of the Illinois prairie to its original condition. All the animals here were once native to the area. It surprises many folks to learn that buffalo, bald eagles, bears, and even mountain lions once called Illinois home - because you don't see them in the wild anymore.<br><br>The animals here are kept in areas closely resembling their natural setting. You'll notice in front of us, the large, open field with the stream. Although I don't see any there at the moment, that's where the buffalo roam. The herd is probably grazing at the far end right now. Beyond the stream there's a large, wooded area with fenced-in trails for you to walk along. As you walk, you may see families of foxes, deer, and even bears. But remember, this isn't a zoo with caged animals, these animals are doing what they do in the wild...searching for food, hiding, playing, whatever, so you may have to look long and hard to get a good view of them.</div>39. What is the main purpose of the talk?", a:"c", exp:"Tujuan utama pembicaraan ini adalah memperkenalkan pengunjung pada Prairie Animal Park ('let me explain a little bit about the park') sebelum mereka mulai melihat-lihat.", o:{a:"To encourage donations for a new park.", b:"To discourage visitors from touching the animals.", c:"To introduce people to a park.", d:"To train new volunteers."} },
            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Part C</b><br><b>Questions 39 through 42:</b> Listen to a tour guide at a wildlife park in central Illinois.<br><br><b>(man)</b> Thank you for choosing to spend a day with us here at Prairie Animal Park. Before you set off to see the animals, let me explain a little bit about the park. Prairie Animal Park is a nonprofit organization and gets no government money. The money from your admission ticket goes entirely to caring for the park and its animals. Most of the people who work here are volunteers. The park covers 2,400 [two thousand four hundred] acres. It was created by a group of people interested in restoring some of the Illinois prairie to its original condition. All the animals here were once native to the area. It surprises many folks to learn that buffalo, bald eagles, bears, and even mountain lions once called Illinois home - because you don't see them in the wild anymore.<br><br>The animals here are kept in areas closely resembling their natural setting. You'll notice in front of us, the large, open field with the stream. Although I don't see any there at the moment, that's where the buffalo roam. The herd is probably grazing at the far end right now. Beyond the stream there's a large, wooded area with fenced-in trails for you to walk along. As you walk, you may see families of foxes, deer, and even bears. But remember, this isn't a zoo with caged animals, these animals are doing what they do in the wild...searching for food, hiding, playing, whatever, so you may have to look long and hard to get a good view of them.</div>40. What do all of the animals in the park have in common?", a:"b", exp:"Pemandu menyatakan bahwa semua hewan di taman tersebut dulunya adalah hewan asli daerah Illinois ('All the animals here were once native to the area').", o:{a:"They live in large herds.", b:"They were once native to the area.", c:"They've been domesticated.", d:"They were once thought to be extinct."} },
            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Part C</b><br><b>Questions 39 through 42:</b> Listen to a tour guide at a wildlife park in central Illinois.<br><br><b>(man)</b> Thank you for choosing to spend a day with us here at Prairie Animal Park. Before you set off to see the animals, let me explain a little bit about the park. Prairie Animal Park is a nonprofit organization and gets no government money. The money from your admission ticket goes entirely to caring for the park and its animals. Most of the people who work here are volunteers. The park covers 2,400 [two thousand four hundred] acres. It was created by a group of people interested in restoring some of the Illinois prairie to its original condition. All the animals here were once native to the area. It surprises many folks to learn that buffalo, bald eagles, bears, and even mountain lions once called Illinois home - because you don't see them in the wild anymore.<br><br>The animals here are kept in areas closely resembling their natural setting. You'll notice in front of us, the large, open field with the stream. Although I don't see any there at the moment, that's where the buffalo roam. The herd is probably grazing at the far end right now. Beyond the stream there's a large, wooded area with fenced-in trails for you to walk along. As you walk, you may see families of foxes, deer, and even bears. But remember, this isn't a zoo with caged animals, these animals are doing what they do in the wild...searching for food, hiding, playing, whatever, so you may have to look long and hard to get a good view of them.</div>41. Where are the animals kept?", a:"c", exp:"Hewan-hewan di taman tersebut ditempatkan di area yang sangat mirip dengan lingkungan alami mereka ('areas closely resembling their natural setting').", o:{a:"In large cages.", b:"In a small, fenced enclosure.", c:"In a setting similar to their natural habitat.", d:"In climate-controlled buildings."} },
            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Part C</b><br><b>Questions 39 through 42:</b> Listen to a tour guide at a wildlife park in central Illinois.<br><br><b>(man)</b> Thank you for choosing to spend a day with us here at Prairie Animal Park. Before you set off to see the animals, let me explain a little bit about the park. Prairie Animal Park is a nonprofit organization and gets no government money. The money from your admission ticket goes entirely to caring for the park and its animals. Most of the people who work here are volunteers. The park covers 2,400 [two thousand four hundred] acres. It was created by a group of people interested in restoring some of the Illinois prairie to its original condition. All the animals here were once native to the area. It surprises many folks to learn that buffalo, bald eagles, bears, and even mountain lions once called Illinois home - because you don't see them in the wild anymore.<br><br>The animals here are kept in areas closely resembling their natural setting. You'll notice in front of us, the large, open field with the stream. Although I don't see any there at the moment, that's where the buffalo roam. The herd is probably grazing at the far end right now. Beyond the stream there's a large, wooded area with fenced-in trails for you to walk along. As you walk, you may see families of foxes, deer, and even bears. But remember, this isn't a zoo with caged animals, these animals are doing what they do in the wild...searching for food, hiding, playing, whatever, so you may have to look long and hard to get a good view of them.</div>42. What does the speaker imply about seeing the animals?", a:"a", exp:"Pemandu memperingatkan bahwa pengunjung mungkin harus melihat lama dan keras untuk melihat hewan karena mereka berperilaku seperti di alam liar (bersembunyi, dll), yang berarti tidak semua hewan akan langsung terlihat.", o:{a:"Not all the animals may be visible.", b:"Certain animals can only be seen in the winter.", c:"Visitors should not get too close to the animals' cages.", d:"Only a few people at a time can view the animals."} },
            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Questions 43 through 46:</b> Listen to part of a lecture in a college music class.<br><br><b>(man)</b> OK...That about does it for today. We're going to spend the next few classes on a different kind of music. We'll examine the development of jazz from its beginnings right on up to the latest in jazz music.<br><br>We'll look at jazz as the most successful music indigenous to the United States...born in New Orleans and raised in Chicago and New York. We'll begin with the African roots of the music and how African rhythms blended with Western music to create an entirely new form.<br><br>Then we'll follow jazz into its heyday - the 1920's, which was known as the Jazz Age. It was in this era that the blues were born. The 1930's saw the evolution of \"swing,\" jazz music played by the big bands like that of Tommy Dorsey. If there's any generalization that can made about jazz, it's that the music is always changing...evolving...from the Bebop of the '40's to the \"cool jazz\" of the '50's and on into the experimental '60's. The '70's saw jazz brought into the electronic age by artists like Herbie Hancock.<br><br>We'll end up listening to some examples of the newest transformation of jazz...Afro-pop and the Latin beats that've brought new international flair to this music born in the United States.<br><br>Be sure to read chapters 13 and 14 of your text. They'll get you started. If there are any jazz devotees among you, feel free to bring in your favorite tapes or CD's to share with the class. Renee ['Re ne'] Rosnes' latest release would be great if anyone has it.</div>43. What is the speaker's main purpose?", a:"c", exp:"Dosen tersebut memberi tahu mahasiswa bahwa mereka akan menghabiskan beberapa kelas berikutnya untuk mempelajari jenis musik yang berbeda, yaitu perkembangan jazz.", o:{a:"To explain what he's going to talk about today.", b:"To summarize the lecture he just gave.", c:"To let students know what they'll be studying soon.", d:"To suggest extra readings."} },

he instruments used in jazz.", c:"The newest transformation of jazz.", d:"The development of jazz recording companies."} },

sicians.", d:"Musical instruments."} },
            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Questions 43 through 46:</b> Listen to part of a lecture in a college music class.<br><br><b>(man)</b> OK...That about does it for today. We're going to spend the next few classes on a different kind of music. We'll examine the development of jazz from its beginnings right on up to the latest in jazz music.<br><br>We'll look at jazz as the most successful music indigenous to the United States...born in New Orleans and raised in Chicago and New York. We'll begin with the African roots of the music and how African rhythms blended with Western music to create an entirely new form.<br><br>Then we'll follow jazz into its heyday - the 1920's, which was known as the Jazz Age. It was in this era that the blues were born. The 1930's saw the evolution of \"swing,\" jazz music played by the big bands like that of Tommy Dorsey. If there's any generalization that can made about jazz, it's that the music is always changing...evolving...from the Bebop of the '40's to the \"cool jazz\" of the '50's and on into the experimental '60's. The '70's saw jazz brought into the electronic age by artists like Herbie Hancock.<br><br>We'll end up listening to some examples of the newest transformation of jazz...Afro-pop and the Latin beats that've brought new international flair to this music born in the United States.<br><br>Be sure to read chapters 13 and 14 of your text. They'll get you started. If there are any jazz devotees among you, feel free to bring in your favorite tapes or CD's to share with the class. Renee ['Re ne'] Rosnes' latest release would be great if anyone has it.</div>46. What does the speaker emphasize about jazz music?", a:"c", exp:"Dosen menekankan bahwa jazz selalu berubah dan berevolusi ('the music is always changing...evolving') dari waktu ke waktu.", o:{a:"It is no longer a popular form of music.", b:"It has only a small group             { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Questions 47 through 50:</b> Listen to a talk being given in a university library.<br><br><b>(woman)</b> Thanks to the generosity of the Alumni Fund, we have been able to upgrade our facility and make it much easier for students and faculty to use our resources. Let me point out our new computers and what they can do. Of course, you've noticed the old card catalogs are gone. We in the reference department spent much of the summer making the switch to an on-line catalog. Using the computer, you can search our files by author, title, subject, or keyword. For example, if you wanted to know what books we have that deal with sharks, you'd type in <i>S</i> (for subject) and <i>sharks</i> and the computer would take you to the listing of books you need. You can access individual works by title as well. The computer gives you all the information that was in the old card catalog, plus it can tell you the status of the book...checked in or out...when it's due back...and so on.<br><br>We've also purchased a few data base files on CD-ROM. Here we have the <i>Reader's Guide to Periodical Literature</i>. This is where you can find references for articles in many general-interest magazines. Let's say you were researching the use pesticides in farming; you would request articles that matched <i>pesticides</i> and <i>agriculture</i>. The data base searches the topics and narrows down the references to articles that discuss both topics. Most of our data bases work in a similar manner. We know everyone is going to find these new computers a real improvement in the services we offer. I can't think of a more significant contribution that the Alumni Fund could have made to our school.</div>47. Who is giving the talk?", a:"b", exp:"Pembicara menyebutkan dirinya berada di 'reference department' (departemen referensi) di sebuah perpustakaan universitas, yang berarti dia adalah pustakawan referensi.", o:{a:"An English professor.", b:"A reference librarian.", c:"A member of the alumni association.", d:"A computer salesperson."} },

            { section: "listening", q: "<div class='mb-4 p-4 bg-slate-50 rounded-xl border border-slate-200 text-sm h-48 overflow-y-auto'><b>Questions 47 through 50:</b> Listen to a talk being given in a university library.<br><br><b>(woman)</b> Thanks to the generosity of the Alumni Fund, we have been able to upgrade our facility and make it much easier for students and faculty to use our resources. Let me point out our new computers and what they can do. Of course, you've noticed the old card catalogs are gone. We in the reference department spent much of the summer making the switch to an on-line catalog. Using the computer, you can search our files by author, title, subject, or keyword. For example, if you wanted to know what books we have that deal with sharks, you'd type in <i>S</i> (for subject) and <i>sharks</i> and the computer would take you to the listing of books you need. You can access individual works by title as well. The computer gives you all the information that was in the old card catalog, plus it can tell you the status of the book...checked in or out...when it's due back...and so on.<br><br>We've also purchased a few data base files on CD-ROM. Here we have the <i>Reader's Guide to Periodical Literature</i>. This is where you can find references for articles in many general-interest magazines. Let's say you were researching the use pesticides in farming; you would request articles that matched <i>pesticides</i> and <i>agriculture</i>. The data base searches the topics and narrows down the references to articles that discuss both topics. Most of our data bases work in a similar manner. We know everyone is going to find these new computers a real improvement in the services we offer. I can't think of a more significant contribution that the Alumni Fund could have made to our school.</div>50. What does the speaker think of the new equipment?", a:"d", exp:"Pembicara yakin bahwa semua orang akan merasa komputer baru ini sebagai peningkatan nyata dala             { section: "structure2", qNum: 1, q: "No spectacle in the universe is _____ than an exploding star.", a:"c", exp: "Comparative degree 'more impressive' digunakan untuk membandingkan dua hal.", o:{a:"Impressive", b:"As impressive", c:"More impressive", d:"The most impressive"} },
            { section: "structure2", qNum: 2, q: "The Allegheny and Monongahela rivers _____ in Pittsburgh, Pennsylvania, to form the Ohio River.", a:"a", exp: "Subjek jamak 'rivers' membutuhkan kata kerja bentuk dasar 'meet'.", o:{a:"Meet", b:"Meeting", c:"For meeting", d:"Which meet"} },
            { section: "structure2", qNum: 3, q: "The horns of a rhinoceros continue _____ throughout its entire lifetime.", a:"b", exp: "Kata kerja 'continue' dapat diikuti oleh to-infinitive (to grow).", o:{a:"It grows", b:"To grow", c:"They grow", d:"Grow"} },
            { section: "structure2", qNum: 4, q: "Mathematics helps meteorologists to predict the weather more accurately, to calculate the speed of storms, and _____", a:"c", exp: "Parallel structure: to predict..., to calculate..., and to determine...", o:{a:"For the wind to blow determines", b:"Causes the wind blowing to determine", c:"To determine what causes the wind to blow", d:"Determine the wind’s blowing"} },
            { section: "structure2", qNum: 5, q: "_____ position of the planet Earth in relation to the Sun is always changing a little bit.", a:"a", exp: "Dibutuhkan definite article 'The' untuk mengawali noun phrase subjek.", o:{a:"The", b:"That the", c:"It was the", d:"There was the"} },
            { section: "structure2", qNum: 6, q: "Systems of phonetic writing are ______ at transcribing accurately any sequence of speech sounds.", a:"b", exp: "Passive voice: are + aimed (V3).", o:{a:"The aim", b:"Aimed", c:"Who aims", d:"By aiming"} },
            { section: "structure2", qNum: 7, q: "In photosynthesis, _____ through which green plants manufacture food, energy from direct sunlight is trapped by a substance called chlorophyll.", a:"c", exp: "Appositive phrase 'the process' menjelaskan photosynthesis.", o:{a:"That the process", b:"Is a process", c:"The process", d:"In which the process"} },
            { section: "structure2", qNum: 8, q: "______ and hard, ivory may be carved with great delicacy into intricate patterns.", a:"b", exp: "Adverbial clause: 'Because it is dense and hard'.", o:{a:"Because of its density", b:"Because it is dense", c:"May be dense", d:"Its density"} },
            { section: "structure2", qNum: 9, q: "A solar eclipse occurs when the Moon is between the Sun and the Earth, _____ shadow of the Moon moves across the face of the Earth.", a:"a", exp: "Dibutuhkan konjungsi 'and' dan artikel 'the' untuk menyambung klausa.", o:{a:"And the", b:"And it is the", c:"That the", d:"That it is the"} },
            { section: "structure2", qNum: 10, q: "The spectacularly beautiful and sultry voice of Lena Horne made her ______.", a:"d", exp: "Complex transitive: make + object + complement (a nationally celebrated vocalist).", o:{a:"Being a nationally", b:"A vocalist was nationally celebrate", c:"As nationally celebrated vocalist", d:"A nationally celebrated vocalist"} },
            { section: "structure2", qNum: 11, q: "The existence of very long channels ______ into the deep-sea floor of the Atlantic and Pacific oceans has been well documented.", a:"d", exp: "Present participle phrase 'cutting into...' menerangkan channels.", o:{a:"Are cut", b:"Cuts", c:"To cut", d:"Cutting"} },
            { section: "structure2", qNum: 12, q: "Lilian Wald’s ____ lies in the field of public health nursing.", a:"d", exp: "Possessive 'Lilian Wald's' diikuti noun phrase 'most distinctive contribution'.", o:{a:"Contribution was most distinctive", b:"Whose most distinctive", c:"Most contributions are distinctive", d:"Most distinctive contribution"} },
            { section: "structure2", qNum: 13, q: "Fine rubies _____ of flaws are extremely rare command high prices.", a:"a", exp: "Adjective phrase 'free of flaws' menerangkan rubies.", o:{a:"Free", b:"Are free", c:"Which free", d:"When are they free"} },
            { section: "structure2", qNum: 14, q: "In some parts of the world, not only _____ a form of entertainment, but it is also a means of communication.", a:"b", exp: "Inversion setelah 'not only': auxiliary 'is' + subject 'whistling'.", o:{a:"Whistling", b:"Is whistling", c:"That whistling is", d:"Why is whistling"} },
            { section: "structure2", qNum: 15, q: "Invented in the 1780’s, threshing machines enabled farmers to process grain _____ they could by hand.", a:"c", exp: "Comparative 'much faster than' digunakan untuk membandingkan kecepatan.", o:{a:"Than much faster", b:"Much than faster", c:"Much faster than", d:"Faster than much"} },
            { section: "structure2", qNum: 16, q: "Patients <span class='underline'>they</span> (A) suffer <span class='underline'>from</span> (B) common arthritis <span class='underline'>can</span> (C) be treated using <span class='underline'>heat</span> (D), physical therapy, and rest.", a:"a", exp: "Kata ganti subjek 'they' tidak diperlukan karena sudah ada subjek 'Patients'. Seharusnya diganti dengan relative pronoun 'who' atau dihilangkan jika menggunakan participle.", o:{a:"they", b:"from", c:"can", d:"heat"} },
            { section: "structure2", qNum: 17, q: "Forests contain more than merely <span class='underline'>tree</span> (A); they <span class='underline'>also</span> (B) include smaller plants, <span class='underline'>such as</span> (C) mosses, shrubs, and wild <span class='underline'>flowers</span> (D).", a:"a", exp: "Kata 'merely' diikuti oleh plural noun dalam konteks ini. 'tree' seharusnya menjadi 'trees'.", o:{a:"tree", b:"also", c:"such as", d:"flowers"} },
            { section: "structure2", qNum: 18, q: "The <span class='underline'>game of</span> (A) marbles, <span class='underline'>which</span> (B) originated in prehistoric times, <span class='underline'>is</span> (C) still played today in <span class='underline'>much</span> (D) land.", a:"d", exp: "Kata 'much' digunakan untuk benda tak terhitung (uncountable). 'land' dalam konteks wilayah/negara adalah countable, sehingga seharusnya 'many lands'.", o:{a:"game of", b:"which", c:"is", d:"much"} },
            { section: "structure2", qNum: 19, q: "The <span class='underline'>modern</span> (A) racing bicycle is <span class='underline'>carefully</span> (B) engineered <span class='underline'>for</span> (C) safety, lightness, and <span class='underline'>reliable</span> (D).", a:"d", exp: "Kesejajaran (parallel structure): 'safety' (noun), 'lightness' (noun), maka 'reliable' (adjective) harus diubah menjadi 'reliability' (noun).", o:{a:"modern", b:"carefully", c:"for", d:"reliable"} },
            { section: "structure2", qNum: 20, q: "<span class='underline'>On</span> (A) 1954 the United States Supreme Court <span class='underline'>ruled on</span> (B) the case of Brown v. Board of Education, <span class='underline'>declaring</span> (C) segregated education <span class='underline'>unconstitutional</span> (D).", a:"a", exp: "Preposisi 'On' tidak tepat untuk tahun. Seharusnya menggunakan 'In 1954'.", o:{a:"On", b:"ruled on", c:"declaring", d:"unconstitutional"} },
            { section: "structure2", qNum: 21, q: "Because glass objects <span class='underline'>are fragile</span> (A), <span class='underline'>least</span> (B) <span class='underline'>have survived</span> (C) from <span class='underline'>ancient</span> (D) civilizations.", a:"b", exp: "Kata 'least' tidak tepat di sini. Seharusnya menggunakan 'few' untuk menyatakan jumlah yang sedikit dari benda yang dapat dihitung (glass objects).", o:{a:"are fragile", b:"least", c:"have survived", d:"ancient"} },
            { section: "structure2", qNum: 22, q: "An important effect <span class='underline'>that</span> (A) criticism can have on contemporary poets <span class='underline'>is</span> (B) the assurance that there is a <span class='underline'>growing</span> (C) interest <span class='underline'>their work</span> (D).", a:"d", exp: "Kekurangan preposisi: Seharusnya 'interest IN their work'.", o:{a:"that", b:"is", c:"growing", d:"their work"} },
            { section: "structure2", qNum: 23, q: "Music festivals, <span class='underline'>which</span> (A) date back as far as the mid-seventeenth century, <span class='underline'>have increased</span> (B) significantly in <span class='underline'>popular</span> (C) within the past few <span class='underline'>decades</span> (D).", a:"c", exp: "Bentuk kata: 'popular' adalah kata sifat (adjective), seharusnya menggunakan kata benda (noun) 'popularity' setelah preposisi 'in'.", o:{a:"which", b:"have increased", c:"popular", d:"decades"} },
            { section: "structure2", qNum: 24, q: "Human skin is a <span class='underline'>complex</span> (A), sensitive <span class='underline'>organ</span> (B) that serves <span class='underline'>many</span> (C) functions necessary for the <span class='underline'>maintain</span> (D) of life.", a:"d", exp: "Bentuk kata: 'maintain' adalah kata kerja (verb), seharusnya menggunakan kata benda (noun) 'maintenance' setelah artikel 'the'.", o:{a:"complex", b:"organ", c:"many", d:"maintain"} },
            { section: "structure2", qNum: 25, q: "<span class='underline'>Space</span> (A) photography and <span class='underline'>advance</span> (B) measurement technology, <span class='underline'>including</span> (C) a laser reflector placed on the Moon, <span class='underline'>have possible made</span> (D) extremely precise measurements of the surfaces of the Earth.", a:"d", exp: "Kesalahan struktur kata: Frasa 'have possible made' seharusnya 'have made possible' (memungkinkan).", o:{a:"Space", b:"advance", c:"including", d:"have possible made"} },
            { section: "structure2", qNum: 26, q: "The scale of demographic <span class='underline'>change</span> (A) that are now occurring and that are <span class='underline'>projected</span> (B) for the near <span class='underline'>future</span> (C) is unprecedented in <span class='underline'>human</span> (D) history.", a:"a", exp: "Kesesuaian jumlah (agreement): Karena diikuti 'that ARE', maka subjeknya harus jamak. 'change' seharusnya 'changes'.", o:{a:"change", b:"projected", c:"future", d:"human"} },
            { section: "structure2", qNum: 27, q: "<span class='underline'>The paintings</span> (A) of artist Abraham Rattner are <span class='underline'>noted for</span> (B) their brilliant <span class='underline'>color</span> (C), rich texture, and <span class='underline'>symbolic</span> (D).", a:"d", exp: "Kesejajaran (parallel structure): 'color' (noun), 'texture' (noun), maka 'symbolic' (adjective) harus menjadi 'symbolism' (noun).", o:{a:"The paintings", b:"noted for", c:"color", d:"symbolic"} },
            { section: "structure2", qNum: 28, q: "<span class='underline'>Between</span> (A) the high and low tidemarks of marine coasts <span class='underline'>existing</span> (B) abundant and <span class='underline'>varied</span> (C) plant <span class='underline'>and</span> (D) animal life.", a:"b", exp: "Kesalahan bentuk kata kerja: Dalam kalimat inversi ini, 'existing' seharusnya 'exist' (kata kerja utama).", o:{a:"Between", b:"existing", c:"varied", d:"and"} },
            { section: "structure2", qNum: 29, q: "The total <span class='underline'>amount of water</span> (A) in the world's <span class='underline'>ecological system</span> (B) has remained the <span class='underline'>same than</span> (C) throughout the <span class='underline'>ages</span> (D).", a:"c", exp: "Perbandingan: Pasangan kata yang benar adalah 'the same as', bukan 'the same than'.", o:{a:"amount of water", b:"ecological system", c:"same than", d:"ages"} },
            { section: "structure2", qNum: 30, q: "Butterflies and moths <span class='underline'>comprise</span> (A) the Lepidoptera order of insects <span class='underline'>find</span> (B) <span class='underline'>throughout</span> (C) <span class='underline'>most of</span> (D) the world.", a:"b", exp: "Passive participle: 'find' seharusnya 'found' (yang ditemukan) untuk menerangkan 'insects'.", o:{a:"comprise", b:"find", c:"throughout", d:"most of"} },
            { section: "structure2", qNum: 31, q: "The <span class='underline'>planet</span> (A) Neptune has two <span class='underline'>known</span> (B) satellites: one <span class='underline'>about</span> (C) the size <span class='underline'>with</span> (D) Earth's Moon, the other much smaller.", a:"d", exp: "Preposisi: Ungkapan yang benar adalah 'the size OF', bukan 'the size WITH'.", o:{a:"planet", b:"known", c:"about", d:"with"} },
            { section: "structure2", qNum: 32, q: "Harry Truman's victory <span class='underline'>over</span> (A) Thomas Dewey was <span class='underline'>one of</span> (B) the biggest <span class='underline'>surprise</span> (C) in the <span class='underline'>political</span> (D) history of the United States.", a:"c", exp: "Kesesuaian jumlah: Frasa 'one of' harus diikuti kata benda jamak. 'surprise' seharusnya 'surprises'.", o:{a:"over", b:"one of", c:"surprise", d:"political"} },
            { section: "structure2", qNum: 33, q: "The narwhal <span class='underline'>resembles like</span> (A) other whales, but has <span class='underline'>a long</span> (B), spiral tusk <span class='underline'>growing form</span> (C) <span class='underline'>its</span> (D) head.", a:"a", exp: "Redundansi: 'Resemble' sudah berarti 'look like'. Jangan gunakan 'like' setelah 'resembles'.", o:{a:"resembles like", b:"a long", c:"growing form", d:"its"} },
            { section: "structure2", qNum: 34, q: "In exchange <span class='underline'>for</span> (A) <span class='underline'>requiring them</span> (B) <span class='underline'>to disclose</span> (C) the workings of their inventions, patents give <span class='underline'>inventors</span> (D) temporary, legally monopolies.", a:"d", exp: "Bentuk kata: 'legally' adalah adverb, seharusnya 'legal' (adjective) untuk menerangkan kata benda 'monopolies'.", o:{a:"for", b:"to disclose", c:"inventors", d:"legally"} },
            { section: "structure2", qNum: 35, q: "Lillian Gish is <span class='underline'>best</span> (A) for her roles in such <span class='underline'>silently</span> (B) films <span class='underline'>as</span> (C) The Birth of a Nation and Broken Blossoms.", a:"b", exp: "Bentuk kata: 'silently' adalah adverb, seharusnya 'silent' (adjective) untuk menerangkan kata benda 'films'.", o:{a:"best", b:"silently", c:"as", d:"Nation"} },
            { section: "structure2", qNum: 36, q: "Oraibi, Arizona, <span class='underline'>built by</span> (A) the Hopi Indians during 1100's, is <span class='underline'>probably the</span> (B) oldest <span class='underline'>continuous</span> (C) inhabited <span class='underline'>settlement</span> (D) in the United States.", a:"c", exp: "Bentuk kata: 'continuous' (adjective) seharusnya 'continuously' (adverb) untuk memodifikasi kata sifat/participle 'inhabited'.", o:{a:"built by", b:"probably the", c:"continuous", d:"settlement"} },
            { section: "structure2", qNum: 37, q: "<span class='underline'>It</span> (A) <span class='underline'>may take</span> (B) several <span class='underline'>hundred years</span> (C) to <span class='underline'>build inch</span> (D) of topsoil.", a:"d", exp: "Kekurangan artikel: Frasa 'build inch' seharusnya 'build an inch' (membangun satu inci).", o:{a:"It", b:"may take", c:"hundred years", d:"build inch"} },
            { section: "structure2", qNum: 38, q: "<span class='underline'>Know for</span> (A) power, <span class='underline'>speed</span> (B) and maneuverability, the goshawk has short wings and <span class='underline'>a</span> (C) long tail, <span class='underline'>enabling them</span> (D) to dodge.", a:"a", exp: "Passive participle: Seharusnya menggunakan 'Known for' (dikenal karena) untuk mengawali frasa keterangan.", o:{a:"Know for", b:"speed", c:"a", d:"enabling them"} },
            { section: "structure2", qNum: 39, q: "Lubrication is essential in machinery because <span class='underline'>if the</span> (A) <span class='underline'>moving part</span> (B) of a machine come into <span class='underline'>direct contact</span> (C) with <span class='underline'>each other</span> (D), friction interferes with motion.", a:"b", exp: "Kesesuaian jumlah: Frasa 'each other' dan kata kerja 'come' menunjukkan subjek harus jamak. 'moving part' seharusnya 'moving parts'.", o:{a:"if the", b:"moving part", c:"direct contact", d:"each other"} },
            { section: "structure2", qNum: 40, q: "One basic principle of <span class='underline'>international</span> (A) air law <span class='underline'>recognize</span> (B) a country's complete sovereignty <span class='underline'>over</span> (C) the airspace above its <span class='underline'>territory</span> (D).", a:"b", exp: "Persesuaian subjek-kata kerja (Subject-Verb Agreement): Subjek tunggal 'One basic principle' membutuhkan kata kerja 'recognizes'.", o:{a:"international", b:"recognize", c:"over", d:"territory"} }
        ];

        let currentFilter = 'all';
        let currentIdx = 0; // The index relative to the FILTERED list
        const answeredMap = new Map(); // Stores the ORIGINAL index -> isCorrect boolean

        // Helper to get filtered data with original indices preserved
        function getFilteredData() {
            return quizData
                .map((item, idx) => ({ ...item, originalIdx: idx }))
                .filter(item => currentFilter === 'all' || item.section === currentFilter);
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-area');
            container.innerHTML = '';
            
            const filtered = getFilteredData();
            const item = filtered[currentIdx];
            if (!item) return;

            const qDiv = document.createElement('div');
            qDiv.className = "quiz-item bg-white rounded-3xl p-8 shadow-sm border border-slate-100 animate-in fade-in duration-500";
            
            let sectionLabel = item.section === 'structure' ? 'Structure 1' : (item.section === 'structure2' ? 'Structure 2' : (item.section === 'listening' ? 'Listening' : (item.section === 'reading' ? 'Reading 1' : 'Reading 2')));
            let labelColor = item.section === 'structure' || item.section === 'structure2' ? 'bg-indigo-100 text-indigo-700' : (item.section === 'listening' ? 'bg-amber-100 text-amber-700' : (item.section === 'reading' ? 'bg-emerald-100 text-emerald-700' : 'bg-cyan-100 text-cyan-700'));
            
            let passageHtml = "";
            if (item.passageImg) {
                passageHtml = `
                    <div class="mb-4">
                        <img src="${item.passageImg}" alt="Reading Passage" class="passage-img" />
                    </div>
                `;
            }

            qDiv.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${labelColor}">${sectionLabel}</span>
                        <span class="text-slate-400 font-medium text-sm">#${currentIdx + 1} of ${filtered.length}</span>
                    </div>
                    ${item.originalIdx !== undefined ? `<span class="text-[10px] font-bold text-slate-300 uppercase">Original ID: ${item.originalIdx + 1}</span>` : ''}
                </div>
                
                ${passageHtml}

                <p class="text-xl font-semibold text-slate-800 mb-8 leading-relaxed">${item.q}</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="options-area">
                    ${['a','b','c','d'].map(letter => `
                        <button onclick="handleChoice(${item.originalIdx}, '${letter}')" 
                                class="option-btn text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-200 hover:bg-indigo-50 flex items-center gap-4 group">
                            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500 group-hover:bg-indigo-100 group-hover:text-indigo-600 uppercase text-xs">${letter}</span>
                            <span class="flex-1 font-medium text-slate-600">${item.o[letter]}</span>
                        </button>
                    `).join('')}
                </div>
                
                <div id="feedback-area" class="mt-8 hidden p-5 rounded-2xl border">
                    <p id="result-text" class="font-bold text-lg mb-1"></p>
                    <p id="exp-text" class="text-sm opacity-90"></p>
                </div>

                <div class="flex justify-between mt-12 pt-8 border-t border-slate-50">
                    <button onclick="prevQuestion()" class="px-8 py-3 bg-slate-100 rounded-2xl font-bold text-slate-600 hover:bg-slate-200 transition-colors ${currentIdx === 0 ? 'opacity-30 pointer-events-none' : ''}">
                        &larr; Sebelumnya
                    </button>
                    <button onclick="nextQuestion()" class="px-8 py-3 bg-indigo-600 rounded-2xl font-bold text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all ${currentIdx === filtered.length - 1 ? 'opacity-30 pointer-events-none' : ''}">
                        Selanjutnya &rarr;
                    </button>
                </div>
            `;
            container.appendChild(qDiv);
            renderNavigation();
        }

        function renderNavigation() {
            const navGrid = document.getElementById('nav-grid');
            if(!navGrid) return;
            navGrid.innerHTML = '';
            
            const filtered = getFilteredData();
            
            filtered.forEach((item, idx) => {
                const box = document.createElement('div');
                const isAnswered = answeredMap.has(item.originalIdx);
                const isCorrect = isAnswered ? answeredMap.get(item.originalIdx) : null;
                const isActive = idx === currentIdx;
                
                let statusClass = '';
                if (isAnswered) {
                    statusClass = isCorrect ? 'answered' : 'wrong';
                }

                box.className = `nav-box ${statusClass} ${isActive ? 'ring-4 ring-indigo-200 border-indigo-500 text-indigo-600' : ''}`;
                box.innerText = idx + 1;
                box.onclick = () => jumpToQuestion(idx);
                navGrid.appendChild(box);
            });
        }

        window.jumpToQuestion = function(idx) {
            currentIdx = idx;
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.nextQuestion = function() {
            const filtered = getFilteredData();
            if(currentIdx < filtered.length - 1) {
                currentIdx++;
                renderQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.prevQuestion = function() {
            if(currentIdx > 0) {
                currentIdx--;
                renderQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.handleChoice = function(originalIdx, choice) {
            const item = quizData[originalIdx];
            const optContainer = document.getElementById('options-area');
            const buttons = optContainer.querySelectorAll('button');
            const feedback = document.getElementById('feedback-area');
            const resultText = document.getElementById('result-text');
            const expText = document.getElementById('exp-text');

            buttons.forEach(b => b.classList.add('disabled'));

            const isCorrect = choice === item.a;
            if(isCorrect) {
                buttons[['a','b','c','d'].indexOf(choice)].classList.add('correct');
                feedback.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-800');
                resultText.innerText = "Benar! ✨";
            } else {
                buttons[['a','b','c','d'].indexOf(choice)].classList.add('wrong');
                buttons[['a','b','c','d'].indexOf(item.a)].classList.add('correct');
                feedback.classList.add('bg-rose-50', 'border-rose-200', 'text-rose-800');
                resultText.innerText = `Salah ❌ (Jawaban: ${item.a.toUpperCase()})`;
            }

            expText.innerText = item.exp || "Jawaban ini didasarkan pada teks bacaan atau aturan tata bahasa yang berlaku.";
            feedback.classList.remove('hidden');
            
            if(!answeredMap.has(originalIdx)) {
                answeredMap.set(originalIdx, isCorrect);
                renderNavigation(); // Refresh grid to show progress
            }
            updateStats();
        }

        function updateStats() {
            const filtered = getFilteredData();
            const total = filtered.length;
            
            let currentScore = 0;
            let currentAnswered = 0;
            
            filtered.forEach(item => {
                if (answeredMap.has(item.originalIdx)) {
                    currentAnswered++;
                    if (answeredMap.get(item.originalIdx)) {
                        currentScore++;
                    }
                }
            });

            const scoreEl = document.getElementById('score');
            const answeredEl = document.getElementById('answered');
            const maxScoreEl = document.getElementById('max-score');
            const maxAnsweredEl = document.getElementById('max-answered');
            
            if(scoreEl) scoreEl.innerText = currentScore;
            if(answeredEl) answeredEl.innerText = currentAnswered;
            if(maxScoreEl) maxScoreEl.innerText = total;
            if(maxAnsweredEl) maxAnsweredEl.innerText = total;
        }

        window.setFilter = function(f) {
            currentFilter = f;
            currentIdx = 0; // Reset to first page of new filter
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
            });
            event.target.classList.add('bg-indigo-600', 'text-white');
            event.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
            renderQuiz();
            updateStats();
        }

        renderQuiz();
        updateStats();
    </script>
</body>
</html>
