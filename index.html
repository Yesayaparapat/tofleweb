<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master TOEFL - Latihan Lengkap 80 Soalan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .option-btn { transition: all 0.2s ease; }
        .correct { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
        .wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
        .disabled { pointer-events: none; opacity: 0.8; }
        
        /* Style for Passage with Line Numbers */
        .passage-container {
            display: flex;
            background: #f8fafc;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            margin-bottom: 2rem;
        }
        .line-numbers {
            padding: 1.5rem 0.75rem;
            background: #f1f5f9;
            border-right: 1px solid #e2e8f0;
            text-align: right;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85rem;
            color: #94a3b8;
            user-select: none;
            line-height: 1.8;
        }
        .passage-content {
            padding: 1.5rem;
            line-height: 1.8;
            font-size: 1rem;
            color: #334155;
            white-space: pre-wrap;
            flex: 1;
        }

        .passage-img {
            width: 100%;
            height: auto;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            margin-bottom: 2rem;
        }

        .nav-box {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1;
            border-radius: 0.75rem;
            border: 2px solid #e2e8f0;
            font-weight: bold;
            font-size: 0.875rem;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-box.answered {
            background-color: #10b981;
            border-color: #10b981;
            color: white;
        }
        .nav-box:hover {
            border-color: #6366f1;
            color: #6366f1;
            background-color: #f5f3ff;
        }
        .nav-box.answered:hover {
            opacity: 0.9;
            background-color: #10b981;
            color: white;
        }

        .sticky-nav { position: sticky; top: 1.5rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 pb-20">

    <div class="max-w-7xl mx-auto px-4 pt-8 lg:flex items-start gap-8">
        <!-- Area Utama (Kiri) -->
        <div class="flex-1">
            <header class="text-center mb-10">
                <h1 class="text-4xl font-extrabold text-indigo-900 mb-2">Simulasi TOEFL Lengkap</h1>
                <p class="text-slate-600 font-medium">94 Soal Terintegrasi (Structure + Written + Full Reading Section)</p>
                
                <div class="mt-6 flex justify-center">
                    <div class="bg-white/90 backdrop-blur shadow-xl border border-indigo-100 rounded-2xl px-8 py-3 flex items-center gap-6">
                        <div class="text-center">
                            <p class="text-[10px] uppercase font-bold text-slate-400">Skor</p>
                            <p class="text-2xl font-black text-indigo-600"><span id="score">0</span> / 94</p>
                        </div>
                        <div class="h-10 w-px bg-slate-200"></div>
                        <div class="text-center">
                            <p class="text-[10px] uppercase font-bold text-slate-400">Progres</p>
                            <p class="text-2xl font-black text-slate-700"><span id="answered">0</span> / 94</p>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex flex-wrap justify-center gap-2 mb-12">
                <button onclick="setFilter('all')" class="filter-btn active px-6 py-2 rounded-full bg-indigo-600 text-white font-bold">Semua</button>
                <button onclick="setFilter('structure')" class="filter-btn px-6 py-2 rounded-full bg-white text-slate-600 border border-slate-200 font-bold hover:bg-indigo-50">Structure</button>
                <button onclick="setFilter('reading')" class="filter-btn px-6 py-2 rounded-full bg-white text-slate-600 border border-slate-200 font-bold hover:bg-indigo-50">Reading 1</button>
                <button onclick="setFilter('reading2')" class="filter-btn px-6 py-2 rounded-full bg-white text-slate-600 border border-slate-200 font-bold hover:bg-indigo-50">Reading 2</button>
            </div>

            <div id="quiz-area" class="space-y-16 pb-20">
                <!-- Questions injected here -->
            </div>
        </div>

        <!-- Sidebar Navigasi (Kanan) -->
        <aside class="w-full lg:w-80 shrink-0 hidden lg:block">
            <div class="sticky-nav bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-slate-800">Navigasi Soal</h2>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Moodle Style</span>
                </div>
                <div id="nav-grid" class="grid grid-cols-5 gap-2 max-h-[70vh] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Nav boxes injected here -->
                </div>
                <div class="mt-6 pt-6 border-t border-slate-50">
                    <div class="flex items-center gap-2 text-xs font-medium text-slate-500">
                        <div class="w-3 h-3 rounded bg-emerald-500"></div>
                        <span>Sudah Dijawab</span>
                    </div>
                    <div class="flex items-center gap-2 text-xs font-medium text-slate-500 mt-2">
                        <div class="w-3 h-3 rounded border-2 border-slate-200"></div>
                        <span>Belum Dijawab</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const quizData = [
            // --- SECTION 1: STRUCTURE & WRITTEN (1-20) ---
            { section: "structure", qNum: 1, q: "__________ team sports require cooperation.", a:"c", exp:"Determiner 'all' diperlukan sebelum plural countable nouns.", o:{a:"of all", b:"they are all", c:"all", d:"why are all"} },
            { section: "structure", qNum: 2, q: "Anyone who has ever pulled weeds from a garden __________ roots firmly anchor plants to the soil.", a:"b", exp:"'Anyone' (singular) butuh verb 'is'. 'That' mengawali klausa baru.", o:{a:"is well aware of", b:"is well aware that", c:"well aware", d:"well aware that"} },
            { section: "structure", qNum: 3, q: "Centuries of erosion have exposed __________ rock surfaces in the Painted Desert of northern Arizona.", a:"c", exp:"Compound adjective 'rainbow-colored' paling tepat menerangkan rock surfaces.", o:{a:"in colors of the rainbow", b:"colored like a rainbow", c:"rainbow-colored", d:"a rainbow's coloring"} },
            { section: "structure", qNum: 4, q: "The higher the temperature of a molecule, __________.", a:"a", exp:"Double comparative: The higher..., the more energy...", o:{a:"the more energy it has", b:"than it has more energy", c:"more energy has it", d:"it has more energy"} },
            { section: "structure", qNum: 5, q: "Frontier surgeon Ephrain MacDonald had to perform operation __________ anesthesia.", a:"c", exp:"Tanpa pembiusan = 'without anesthesia'.", o:{a:"no", b:"not having", c:"without", d:"there wasn't"} },
            { section: "structure", qNum: 6, q: "__________ young, chimpanzees are easily trained.", a:"b", exp:"Reduced clause: 'When (they are) young'.", o:{a:"when are", b:"when", c:"they are", d:"when they"} },
            { section: "structure", qNum: 7, q: "A person of __________ age may suffer from defects of vision.", a:"d", exp:"'Any' merujuk kepada usia berapapun.", o:{a:"every", b:"some", c:"certain", d:"any"} },
            { section: "structure", qNum: 8, q: "__________ have settled, one of their first concerns has been to locate an adequate water supply.", a:"a", exp:"'Wherever people' mengawali klausa keterangan tempat.", o:{a:"wherever people", b:"there are people who", c:"whether people", d:"people"} },
            { section: "structure", qNum: 9, q: "If a bar magnet is __________, the two pieces form two complete magnets, each with a north and south pole.", a:"a", exp:"Passive voice: is + broken (V3).", o:{a:"broken", b:"broke", c:"breaking", d:"break"} },
            { section: "structure", qNum: 10, q: "The type of plant and animal life... depends on the soil of the pond, __________, and the pond's location.", a:"c", exp:"Parallel structure: soil, quality, location (semua noun phrases).", o:{a:"what the quality of the water is", b:"how is the water quality", c:"the quality of the water", d:"what is the water quality"} },
            { section: "structure", qNum: 11, q: "The architectural style of the new building is __________ of the many diverse influences in the city.", a:"a", exp:"Adjective 'representative' tepat untuk melengkapi subjek.", o:{a:"representative", b:"represent", c:"representing", d:"represents"} },
            { section: "structure", qNum: 12, q: "Not only __________ to determine the depth of the ocean, but it also helps map the ocean floor.", a:"b", exp:"Inversion setelah 'Not only': Auxiliary + Subject.", o:{a:"sonar is used", b:"is sonar used", c:"sonar used", d:"does sonar used"} },
            { section: "structure", qNum: 13, q: "__________ the high cost of production, the film was a major success at the box office.", a:"a", exp:"'Despite' diikuti noun phrase untuk menunjukkan kontras.", o:{a:"Despite", b:"Although", c:"In spite", d:"Even though"} },
            { section: "structure", qNum: 14, q: "The committee members __________ the proposal for several hours before reaching a final decision.", a:"c", exp:"Present Perfect Continuous menekankan durasi kegiatan.", o:{a:"has discussed", b:"was discussing", c:"have been discussing", d:"discussing"} },
            { section: "structure", qNum: 15, q: "Rarely __________ such a beautiful sunset in this part of the country.", a:"b", exp:"Inversion setelah adverbial negatif 'Rarely'.", o:{a:"one sees", b:"does one see", c:"one has seen", d:"seeing"} },
            
            // Written Expression (16-44)
            { section: "structure", qNum: 16, q: "Ceramics can be harder, <span class='underline'>light</span> (A), and more <span class='underline'>resistant</span> (B) to <span class='underline'>heat</span> (C) than <span class='underline'>metals</span> (D).", a:"a", exp:"Kesejajaran (parallel structure): 'harder' dan 'more resistant' adalah bentuk komparatif, sehingga 'light' harus diubah menjadi 'lighter' agar sejajar.", o:{a:"light", b:"resistant", c:"heat", d:"metals"} },
            { section: "structure", qNum: 17, q: "<span class='underline'>Not everyone</span> (A) realizes <span class='underline'>that</span> (B) the <span class='underline'>most largest</span> (C) organ of the <span class='underline'>human</span> (D) body is the skin.", a:"c", exp:"Superlative ganda: 'most largest' tidak benar karena redundan. Yang benar adalah cukup 'the largest' saja.", o:{a:"Not everyone", b:"that", c:"most largest", d:"human"} },
            { section: "structure", qNum: 18, q: "Mold is <span class='underline'>extremely</span> (A) <span class='underline'>destruction</span> (B) <span class='underline'>to books</span> (C) in <span class='underline'>a library</span> (D).", a:"b", exp:"Bentuk kata: 'destruction' adalah kata benda, seharusnya digunakan kata sifat 'destructive' untuk mengikuti kata keterangan 'extremely'.", o:{a:"extremely", b:"destruction", c:"to books", d:"a library"} },
            { section: "structure", qNum: 19, q: "Sidney Lanier <span class='underline'>achieved</span> (A) fame both <span class='underline'>as a</span> (B) poet <span class='underline'>or</span> (C) as a symphony <span class='underline'>musician</span> (D).", a:"c", exp:"Konjungsi korelatif: 'both' selalu berpasangan dengan 'and', bukan 'or'. Jadi 'or' harus diganti 'and'.", o:{a:"achieved", b:"as a", c:"or", d:"musician"} },
            { section: "structure", qNum: 20, q: "<span class='underline'>The horses</span> (A) used <span class='underline'>play</span> (B) polo are not of any <span class='underline'>special</span> (C) breed or of any <span class='underline'>definite</span> (D) size.", a:"b", exp:"Bentuk kata kerja: 'play' seharusnya 'to play' (infinitif tujuan) karena digunakan setelah kata 'used'.", o:{a:"The horses", b:"play", c:"special", d:"definite"} },
            { section: "structure", qNum: 21, q: "A tapestry <span class='underline'>consists of</span> (A) a foundation weave, called the warp, <span class='underline'>which</span> (B) across are passed different <span class='underline'>colored</span> (C) threads, called the weft, forming decorative <span class='underline'>patterns</span> (D).", a:"b", exp:"Frasa preposisi: 'which across' tidak benar. Seharusnya 'across which' — preposisi harus diletakkan sebelum kata ganti relatif.", o:{a:"consists of", b:"which", c:"colored", d:"patterns"} },
            { section: "structure", qNum: 22, q: "The <span class='underline'>works</span> (A) of early American woodcarvers <span class='underline'>had many</span> (B) artistic qualities, but these craftsmen probably <span class='underline'>did not</span> (C) think of <span class='underline'>them</span> (D) as artists.", a:"d", exp:"Kata ganti refleksif: 'them' seharusnya 'themselves' karena mengacu kembali pada subjek 'craftsmen' (para pengrajin itu sendiri).", o:{a:"works", b:"had many", c:"did not", d:"them"} },
            { section: "structure", qNum: 23, q: "Perhaps mankind's <span class='underline'>first</span> (A) important <span class='underline'>musical</span> (B) influence <span class='underline'>were</span> (C) the songs of <span class='underline'>birds</span> (D).", a:"c", exp:"Kesesuaian subjek-predikat: 'influence' adalah kata benda tunggal, sehingga kata kerjanya harus 'was', bukan 'were'.", o:{a:"first", b:"musical", c:"were", d:"birds"} },
            { section: "structure", qNum: 24, q: "The techniques of science and <span class='underline'>magic</span> (A) are quite <span class='underline'>different</span> (B), but their basic aims—<span class='underline'>to understand</span> (C) and control nature—<span class='underline'>they are</span> (D) very similar.", a:"d", exp:"Redundansi subjek: kata 'they' tidak diperlukan karena 'basic aims' sudah menjadi subjek. Seharusnya langsung 'are very similar'.", o:{a:"magic", b:"different", c:"to understand", d:"they are"} },
            { section: "structure", qNum: 25, q: "It was in a cave near Magdalena, New Mexico, <span class='underline'>when</span> (A) the <span class='underline'>oldest</span> (B) <span class='underline'>known</span> (C) ears of cultivated corn were <span class='underline'>discovered</span> (D).", a:"a", exp:"Kata keterangan relatif: gunakan 'where' untuk menunjukkan tempat (gua/cave), bukan 'when' yang digunakan untuk waktu.", o:{a:"when", b:"oldest", c:"known", d:"discovered"} },
            { section: "structure", qNum: 26, q: "The fossil remains of <span class='underline'>much</span> (A) extinct <span class='underline'>mammals</span> (B) have been <span class='underline'>found</span> (C) <span class='underline'>in</span> (D) the tar pits at Rancho La Brea in Los Angeles.", a:"a", exp:"Kata bilangan: 'mammals' adalah kata benda yang bisa dihitung (countable), sehingga harus menggunakan 'many', bukan 'much'.", o:{a:"much", b:"mammals", c:"found", d:"in"} },
            { section: "structure", qNum: 27, q: "Sharks <span class='underline'>can detect</span> (A) minute <span class='underline'>electrical</span> (B) discharges <span class='underline'>coming</span> (C) from <span class='underline'>its</span> (D) prey.", a:"d", exp:"Kesesuaian kata ganti: 'Sharks' adalah subjek jamak, sehingga kata ganti yang tepat adalah 'their', bukan 'its'.", o:{a:"can detect", b:"electrical", c:"coming", d:"its"} },
            { section: "structure", qNum: 28, q: "A dark nebula consists of <span class='underline'>a cloud of</span> (A) interstellar dust <span class='underline'>enough dense</span> (B) <span class='underline'>to obscure</span> (C) the stars <span class='underline'>beyond</span> (D) it.", a:"b", exp:"Urutan kata: kata 'enough' harus diletakkan setelah kata sifat yang dimodifikasinya. Yang benar adalah 'dense enough', bukan 'enough dense'.", o:{a:"a cloud of", b:"enough dense", c:"to obscure", d:"beyond"} },
            { section: "structure", qNum: 29, q: "<span class='underline'>Commercially</span> (A) honey is heated and <span class='underline'>filtered</span> (B) in order to <span class='underline'>stabilize</span> (C) and clarify <span class='underline'>it</span> (D).", a:"a", exp:"Bentuk kata: 'Commercially' adalah kata keterangan, seharusnya digunakan kata sifat 'Commercial' untuk menerangkan kata benda 'honey'.", o:{a:"Commercially", b:"filtered", c:"stabilize", d:"it"} },
            { section: "structure", qNum: 30, q: "The <span class='underline'>various</span> (A) parts of the body require <span class='underline'>so</span> (B) different <span class='underline'>surgical</span> (C) skills that <span class='underline'>many</span> (D) surgical specialties have developed.", a:"b", exp:"Penentu (determiner): gunakan 'such' (bukan 'so') ketika diikuti kata sifat dan kata benda jamak. Pola yang benar: 'such + adjective + plural noun'.", o:{a:"various", b:"so", c:"surgical", d:"many"} },
            { section: "structure", qNum: 31, q: "One reason birds <span class='underline'>have been</span> (A) so successful is <span class='underline'>because of</span> (B) their <span class='underline'>able</span> (C) to escape from danger <span class='underline'>quickly</span> (D).", a:"c", exp:"Bentuk kata: 'able' adalah kata sifat, seharusnya digunakan kata benda 'ability' setelah kata kepemilikan 'their'. Pola: 'their ability to...'.", o:{a:"have been", b:"because of", c:"able", d:"quickly"} },
            { section: "structure", qNum: 32, q: "The <span class='underline'>wood</span> (A) of the rosewood tree <span class='underline'>is used</span> (B) to <span class='underline'>do</span> (C) fine <span class='underline'>musical</span> (D) instruments.", a:"c", exp:"Pilihan kata: kata 'do' tidak tepat di sini. Gunakan 'make' ketika memproduksi atau menciptakan sesuatu yang bersifat fisik.", o:{a:"wood", b:"is used", c:"do", d:"musical"} },
            { section: "structure", qNum: 33, q: "Chemical engineering is based <span class='underline'>on</span> (A) the <span class='underline'>principles</span> (B) of physics, <span class='underline'>chemists</span> (C), and <span class='underline'>mathematics</span> (D).", a:"c", exp:"Kesejajaran (parallel structure): 'physics' dan 'mathematics' adalah nama bidang ilmu, sehingga harus digunakan 'chemistry', bukan 'chemists' (yang berarti 'para ahli kimia').", o:{a:"on", b:"principles", c:"chemists", d:"mathematics"} },
            { section: "structure", qNum: 34, q: "Ballet performers <span class='underline'>must be</span> (A) believable <span class='underline'>actors</span> (B) and actresses <span class='underline'>as well</span> (C) as <span class='underline'>experts</span> (D) dancers.", a:"d", exp:"Bentuk kata sifat: 'expert' digunakan sebagai kata sifat untuk menerangkan 'dancers'. Kata sifat tidak memiliki bentuk jamak, jadi yang benar adalah 'expert dancers', bukan 'experts dancers'.", o:{a:"must be", b:"actors", c:"as well", d:"experts"} },
            { section: "structure", qNum: 35, q: "Venus, <span class='underline'>the second</span> (A) planet <span class='underline'>from</span> (B) the Sun, is <span class='underline'>exactly almost</span> (C) the <span class='underline'>same size as</span> (D) the Earth.", a:"c", exp:"Urutan kata: urutan yang benar adalah 'almost exactly' (hampir persis), bukan 'exactly almost'. Kata 'almost' harus mendahului 'exactly'.", o:{a:"the second", b:"from", c:"exactly almost", d:"same size as"} },
            { section: "structure", qNum: 36, q: "P T. Barnum opened <span class='underline'>his own</span> (A) circus in 1871 and <span class='underline'>become</span> (B) the <span class='underline'>most famous</span> (C) showman of his <span class='underline'>time</span> (D).", a:"b", exp:"Kala (tense): 'become' seharusnya 'became' (bentuk lampau/past tense) agar sejajar dengan kata kerja 'opened' sebelumnya.", o:{a:"his own", b:"become", c:"most famous", d:"time"} },
            { section: "structure", qNum: 37, q: "The way a child <span class='underline'>plays with</span> (A) other children reveals <span class='underline'>a lots</span> (B) about <span class='underline'>the child's</span> (C) emotional <span class='underline'>development</span> (D).", a:"b", exp:"Idiom: 'a lots' adalah bentuk yang salah. Yang benar adalah 'a lot' (banyak) atau 'lots' tanpa artikel 'a'.", o:{a:"plays with", b:"a lots", c:"the child's", d:"development"} },
            { section: "structure", qNum: 38, q: "Sheep <span class='underline'>have been</span> (A) <span class='underline'>domesticated</span> (B) for <span class='underline'>over</span> (C) 5,000 <span class='underline'>years ago</span> (D).", a:"d", exp:"Ekspresi waktu: 'for' dan 'ago' tidak dapat digunakan bersamaan. Pilih salah satu: 'for over 5,000 years' (durasi) atau '5,000 years ago' (lampau).", o:{a:"have been", b:"domesticated", c:"over", d:"years ago"} },
            { section: "structure", qNum: 39, q: "Chemical compounds <span class='underline'>with</span> (A) barium, cobalt, and strontium <span class='underline'>are</span> (B) responsible <span class='underline'>to</span> (C) many of the vivid <span class='underline'>colors</span> (D) in fireworks.", a:"c", exp:"Preposisi: 'responsible' harus diikuti oleh 'for' (bertanggung jawab atas), bukan 'to'. Pola baku: 'responsible for'.", o:{a:"with", b:"are", c:"to", d:"colors"} },
            { section: "structure", qNum: 40, q: "Duke University in North Carolina <span class='underline'>has</span> (A) an outstanding <span class='underline'>collecting</span> (B) of documents <span class='underline'>concerning</span> (C) Southern <span class='underline'>history</span> (D).", a:"b", exp:"Bentuk kata: 'collecting' adalah kata kerja (gerund), seharusnya digunakan kata benda 'collection' (koleksi) sebagai objek dari 'an outstanding'.", o:{a:"has", b:"collecting", c:"concerning", d:"history"} },
            { section: "structure", qNum: 41, q: "The <span class='underline'>most</span> (A) <span class='underline'>successfully</span> (B) entrepreneurs are those who <span class='underline'>can</span> (C) adapt quickly <span class='underline'>to</span> (D) changing markets.", a:"b", exp:"Kata keterangan 'successfully' harusnya kata sifat 'successful' karena berfungsi menerangkan kata benda 'entrepreneurs'.", o:{a:"A", b:"B", c:"C", d:"D"} },
            { section: "structure", qNum: 42, q: "Neither the quality <span class='underline'>nor</span> (A) the price <span class='underline'>of</span> (B) the goods <span class='underline'>were</span> (C) acceptable <span class='underline'>to</span> (D) the customers.", a:"c", exp:"Kesesuaian subjek-predikat: pada pola 'neither...nor', kata kerja mengikuti subjek yang terdekat ('the price' = tunggal), sehingga harus 'was', bukan 'were'.", o:{a:"A", b:"B", c:"C", d:"D"} },
            { section: "structure", qNum: 43, q: "The <span class='underline'>number</span> (A) of students <span class='underline'>attending</span> (B) the seminar <span class='underline'>are</span> (C) increasing <span class='underline'>every</span> (D) year.", a:"c", exp:"Kesesuaian subjek: frasa 'The number of' dianggap tunggal, sehingga memerlukan kata kerja 'is', bukan 'are'.", o:{a:"A", b:"B", c:"C", d:"D"} },
            { section: "structure", qNum: 44, q: "If I <span class='underline'>was</span> (A) you, I <span class='underline'>would</span> (B) take <span class='underline'>the</span> (C) opportunity to study <span class='underline'>abroad</span> (D).", a:"a", exp:"Kalimat pengandaian tipe 2: pada conditional type 2, kata 'was' harus diganti 'were' untuk semua subjek, termasuk 'I'. Pola: 'If I were...'.", o:{a:"A", b:"B", c:"C", d:"D"} },

            // --- SECTION 2: READING ---
            // PASSAGE 1: COOLIDGE (Questions 1-9)

            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "1. What is the primary purpose of this passage?", a:"d", exp:"The primary purpose of this passage is to detail the stages of the sun's life in the future", o:{a:"To alert people to the dangers posed by the sun", b:"To discuss conditions on Earth in the far future", c:"To present a theory about red giant stars", d:"To describe changes that the sun will go through"} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "2. The word fueled in paragraph 1 is closest in meaning to", a:"a", exp:"The word fueled is closest in meaning to powered", o:{a:"powered.", b:"bombarded.", c:"created.", d:"Propelled."} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "3. Look at the word 'They' in the text. What does the word 'They' refer to?", a:"b", exp:"The word They refers to thermonuclear reactions.", o:{a:"hydrogen and helium", b:"thermonuclear reactions", c:"the sun and earth", d:"size and brightness"} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "4. The following sentence can be added to paragraph 1. 'It maintains its size because the heat deep inside the sun produces pressure that offsets the force of gravity.' Where would it best fit in the paragraph?<br><br>The sun today is a yellow dwarf star. <b>(1)</b> It has existed in its present state for about 4 billion, 600 million years and is thousands of times larger than the earth. <b>(2)</b> The sun is fueled by thermonuclear reactions near its center that convert hydrogen to helium. <b>(3)</b> They release so much energy that the sun can shine for about 10 billion years with little change in its size or brightness. <b>(4)</b> This balance of forces keeps the gases of the sun from pulling any closer together.", a:"d", exp:"Penjelasan posisi: (1) & (2) Salah, karena menyela alur deskripsi fisik pengenalan matahari. (3) Salah, karena akan memutus rujukan kata ganti 'They' dari 'thermonuclear reactions' di kalimat sebelumnya. (4) BENAR, karena kalimat sisipan ini membahas keseimbangan antara panas dan gravitasi, yang langsung dihubungkan oleh kalimat berikutnya: 'This balance of forces...'", o:{a:"(1)", b:"(2)", c:"(3)", d:"(4)"} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "5. It can be inferred from the passage that the sun", a:"a", exp:"The sun has existed in its present state for about 4 billion, 600 million years and can shine for about 10 billion years (paragraph 1). It is expected to become a red giant in about 5 billion years (paragraph 2). Therefore, it is about halfway through its life as a yellow dwarf.", o:{a:"is approximately halfway through its life as a yellow dwarf.", b:"has been in existence for 10 billion years.", c:"is rapidly changing in size and brightness.", d:"will continue as a yellow dwarf for another 10 billion years."} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "6. Look at the word 'core' in the text below:<br><br>About 5 billion years from now, the <b>core</b> of the sun will shrink and become hotter. The temperature at the <b>surface</b> will fall. The higher temperature of the <b>interior</b> will increase the <b>rate</b> of thermonuclear reactions.<br><br>Which word in the text is most nearly OPPOSITE in meaning to the word 'core'?", a:"a", exp:"The word 'core' is most nearly OPPOSITE in meaning to 'surface'.", o:{a:"surface", b:"interior", c:"temperature", d:"rate"} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "7. What will probably be the first stage of change as the sun becomes a red giant?", a:"d", exp:"Paragraph 2 states that 'the core of the sun will shrink and become hotter.'", o:{a:"The core will cool off and use less fuel.", b:"The surface will become hotter and shrink.", c:"The sun will throw off huge amounts of gases.", d:"The core will grow smaller and hotter."} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "8. When the sun becomes a red giant, what will conditions be like on Earth?", a:"c", exp:"The second paragraph describes the process by which the sun becomes a red giant star. The last sentence of that paragraph states: 'Temperatures on the earth will become too hot for life to exist.'", o:{a:"Its atmosphere will freeze and become solid.", b:"It will be enveloped in the expanding surface of the sun.", c:"It will become too hot for life to exist.", d:"It will be destroyed in nova explosions."} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "9. As a white dwarf, the sun will be", a:"b", exp:"Paragraph 3 indicates that the sun will be a white dwarf 'after it shrinks to about the size of the earth.' Paragraph 1 indicates that the sun today is thousands of times larger than the earth. Therefore, the sun will be thousands of times smaller than it is today.", o:{a:"the same size as the planet Mercury.", b:"thousands of times smaller than it is today.", c:"around 35 million miles in diameter.", d:"cold and dark."} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "10. According to the passage, which of the following best describes the sequence of stages that the sun will probably pass through?", a:"c", exp:"According to the passage, the sun is now a yellow dwarf star; it will then expand to a red giant star, shrink to a white dwarf star, and finally cool to a black dwarf star.", o:{a:"Yellow dwarf, white dwarf, red giant, black giant", b:"Red giant, white dwarf, black dwarf, nova explosion", c:"Yellow dwarf, red giant, white dwarf, black dwarf", d:"White giant, red giant, black dwarf, yellow dwarf"} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "11. The phrase throw off in paragraph 3 is closest in meaning to", a:"a", exp:"The phrase throw off is closest in meaning to eject.", o:{a:"eject.", b:"burn up.", c:"convert.", d:"let in."} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "12. Look at the word 'there' in the text below:<br><br>After billions of years as a white dwarf, the sun will have used up all its fuel and will have lost its heat. Such a star is called a black dwarf. After the sun has become a black dwarf, <b>the earth</b> will be dark and cold. If any atmosphere remains <b>there</b>, it will have frozen onto the earth's surface.<br><br>Which word or phrase in the text does the word 'there' refer to?", a:"c", exp:"The word 'there' refers to the earth.", o:{a:"the sun", b:"a black dwarf", c:"the earth", d:"atmosphere"} },
            { section: "reading2", passageImg: "soal1sampai13section2.png", q: "13. Which of the following best describes the tone of the passage?", a:"d", exp:"Although the passage describes the end of the earth, that event is so far in the future that the author's tone is scientifically dispassionate.", o:{a:"Alarmed", b:"Pessimistic", c:"Comic", d:"Objective"} },

            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "14. Why does the author most likely mention George Washington in the first paragraph?", a:"b", exp:"Washington was one of the first people to realize the importance of canals and headed the first company in the United States formed to build a canal.", o:{a:"He was President at the time the Erie Canal was built.", b:"He was involved in pioneering efforts to build canals.", c:"He successfully opened the first canal in the United States.", d:"He commissioned engineers to study the possibility of building the Erie Canal."} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "15. The word feasibility in paragraph 1 is closest in meaning to", a:"c", exp:"The word feasibility is closest in meaning to possibility", o:{a:"profitability.", b:"difficulty.", c:"possibility.", d:"capability."} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "16. Look at the word 'means' in the text below:<br><br>It was never completed, but it showed the nation the <b>feasibility</b> of canals. As the country expanded westward, <b>settlers</b> in western New York, Pennsylvania, and Ohio needed a <b>means</b> to ship goods. Canals linking natural <b>waterways</b> seemed to supply an effective <b>method</b>.<br><br>Which word or phrase in the text is closest in meaning to the word 'means'?", a:"d", exp:"The word means is closest in meaning to the word method.", o:{a:"feasibility", b:"settlers", c:"waterways", d:"method"} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "17. According to the passage, the Erie Canal connected the", a:"b", exp:"According to paragraph 2, the canal linked Albany on the Hudson River with Buffalo on Lake Erie.", o:{a:"Potomac and Ohio Rivers.", b:"Hudson River and Lake Erie.", c:"Delaware and Potomac Rivers.", d:"Atlantic Ocean and the Hudson River"} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "18. Look at the word 'halted' in the text below:<br><br>The first attempt to dig the canal, to be called the Erie Canal, was made by private companies but only a comparatively small portion was built before the project was <b>halted</b> for lack of funds. The cost of the project was an estimated $5 million, an enormous amount for those days. There was some on-again-off-again federal funding, but this time the War of 1812 <b>put an end to</b> construction.<br><br>Which word or phrase in the text is closest in meaning to the word 'halted'?", a:"d", exp:"The phrase 'halted' is closest in meaning to the phrase 'put an end to'.", o:{a:"comparatively small", b:"estimated", c:"on-again-off-again", d:"put an end to"} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "19. The phrase on-again-off-again in paragraph 3 could be replaced by which of the following with the least change in meaning?", a:"a", exp:"The phrase on-again-off-again is closest in meaning to the word Intermittent.", o:{a:"Intermittent", b:"Unsolicited", c:"Ineffectual", d:"Gradual"} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "20. The completion of the Erie Canal was financed by", a:"a", exp:"According to the passage, the governor of New York 'persuaded the state to finance and build the canal' (paragraph 3).", o:{a:"New York.", b:"private companies.", c:"the federal government.", d:"DeWitt Clinton."} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "21. The actual cost of building the Erie Canal was", a:"c", exp:"The cost had been estimated at $5 million but actually cost $2 million more (paragraph 3), a total of $7 million.", o:{a:"$5 million.", b:"less than had been estimated.", c:"$7 million.", d:"more than could be repaid."} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "22. The word tolls in paragraph 4 is closest in meaning to which of the following?", a:"d", exp:"The word tolls is closest in meaning to the word Fees.", o:{a:"Jobs", b:"Grants", c:"Links", d:"Fees"} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "23. Which of the following is NOT given as an effect of the building of the Erie Canal in paragraph 4?", a:"d", exp:"According to paragraph 4, the canal 'allowed New York to supplant (replace) Boston, Philadelphia, and other eastern cities as the chief center of both domestic and foreign commerce.' The other effects are mentioned in this paragraph.", o:{a:"It allowed the East coast to trade with the Great Lakes area.", b:"It took water traffic away from the Mississippi River.", c:"It helped determine the outcome of the Civil War.", d:"It established Boston and Philadelphia as the most important centers of trade."} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "24. What can be inferred about railroads in 1849 from the information in the last paragraph?", a:"c", exp:"Paragraph 5 indicates that the expansion of the canal would have been warranted 'had it not been for the development of the railroads.' (This means, 'if the railroads had not been developed.') The railroads must have taken so much traffic away from the canal that expansion was no longer needed.", o:{a:"They were being planned but had not yet been built.", b:"They were seriously underdeveloped.", c:"They had begun to compete with the Erie Canal for traffic.", d:"They were weakened by the expansion of the canal."} },
            { section: "reading2", passageImg: "soal14sampai25section2.png", q: "25. The word warranted in paragraph 5 is closest in meaning to", a:"b", exp:"The word warranted is closest in meaning to justified.", o:{a:"guaranteed.", b:"justified.", c:"hastened.", d:"prevented."} },

            // PASSAGE 3 (Questions 26-38)
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "26. Which of the following is the main topic of the passage?", a:"d", exp:"The passage mainly deals with the distress signals of trees. There is no direct information about the other choices in the passage.", o:{a:"The vibrations produced by insects", b:"The mission of the U.S. Forest Service", c:"The effect of insects on trees", d:"The sounds made by trees"} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "27. The word them in paragraph 1 refers to", a:"a", exp:"The reference is to the word trees in the third sentence.", o:{a:"trees.", b:"scientists.", c:"insects.", d:"vultures."} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "28. Look at the word 'drawn' in the text below:<br><br>It's a sound you will probably never hear, a sickened tree sending out a distress signal. However, a team of scientists with the U.S. Department of Agriculture's Forest Service has recently heard the cries, and they think some insects also hear the trees and are <b>drawn</b> to them like vultures <b>attracted</b> to a dying animal.<br><br>Which word or phrase in the text is closest in meaning to the word 'drawn'?", a:"c", exp:"The word drawn is closest in meaning to attracted. The word drawn is the past participle of the verb draw, which sometimes means to pull or attract.", o:{a:"sickened", b:"heard", c:"attracted", d:"dying"} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "29. Look at the word 'parched' in the text below:<br><br>Researchers hypothesized that these sounds—actually vibrations produced by the surface of plants—were caused by a severe lack of moisture. They fastened electronic sensors to the bark of <b>drought-stricken</b> trees and clearly heard distress calls. According to one of the scientists, most <b>parched</b> trees transmit their plight in the 50–500 kilohertz range. (The unaided human ear can detect no more than 20 kilohertz.)<br><br>Which word or phrase in the text is closest in meaning to the word 'parched'?", a:"c", exp:"The word parched has the same meaning as drought-stricken. A drought is a time of no rainfall. Drought-stricken, therefore, means damaged by a lack of water. The word parched means very dry.", o:{a:"vibrations", b:"moisture", c:"drought-stricken", d:"kilohertz range"} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "30. The word plight in paragraph 2 is closest in meaning to", a:"b", exp:"The word plight is closest in meaning to condition. A plight is a dangerous or terrible condition.", o:{a:"cry.", b:"condition.", c:"need.", d:"presence."} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "31. Which of the following sentences explains how the researchers conducted their experiment?", a:"b", exp:"The correct answer is: 'They fastened electronic sensors to the bark of drought-stricken trees and clearly heard distress calls.'", o:{a:"Researchers hypothesized that these sounds were caused by a severe lack of moisture.", b:"They fastened electronic sensors to the bark of drought-stricken trees.", c:"According to one of the scientists, most parched trees transmit their plight.", d:"The unaided human ear can detect no more than 20 kilohertz."} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "32. It can be inferred from the passage that the sounds produced by the trees", a:"c", exp:"The trees' signals are in the 50-500 kilohertz range; the unaided human ear can detect no more than 20 kilohertz (paragraph 2).", o:{a:"serve as a form of communication among trees.", b:"are the same no matter what type of tree produces them.", c:"cannot be heard by the unaided human ear.", d:"fall into the 1-20 kilohertz range."} },

            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "36. In paragraph 3, the phrase pick up could best be replaced by which of the following?", a:"a", exp:"In the context of the passage, pick up means Perceive.", o:{a:"Perceive", b:"Lift", c:"Transmit", d:"Attack"} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "37. All of the following are mentioned as possible factors in drawing insects to weakened trees EXCEPT", a:"d", exp:"The first and second choices are mentioned in paragraph 3; the third choice is mentioned throughout the passage; there is no mention of the fourth choice.", o:{a:"thermal changes.", b:"smells.", c:"sounds.", d:"changes in color."} },
            { section: "reading2", passageImg: "soal26sampai38section2.png", q: "38. It can be inferred from the passage that, at the time the passage was written, research concerning the distress signals of trees", a:"c", exp:"Paragraph 3 says, 'Researchers are now running tests,' implying that, at the time the article was written, research was continuing.", o:{a:"had been conducted many years previously.", b:"had been unproductive up until then.", c:"was continuing.", d:"was no longer sponsored by the government."} },

            // PASSAGE 4 (Questions 39-50)
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "39. The author's main purpose in writing this passage is to", a:"b", exp:"The purpose of the passage is primarily to describe Charlie Chaplin's movie, Modern Times.", o:{a:"criticize the factory system of the 1930s.", b:"analyze an important film.", c:"explain Chaplin's style of acting.", d:"discuss how film reveals the benefits of technology."} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "40. According to the passage, Chaplin got the idea for the film Modern Times from a", a:"d", exp:"Paragraph 1 states that Chaplin 'was motivated to make the film by a reporter' during an interview.", o:{a:"newspaper article.", b:"scene in a movie.", c:"job he had once held.", d:"conversation with a reporter."} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "41. Look at the word 'jammed' in the text below:<br><br>Within four or five years, these young men's health was <b>destroyed</b> by the stress of work in the factories. The film opens with a shot of a mass of sheep <b>jammed</b> into pens. Abruptly the scene shifts to a scene of factory workers <b>packed</b> into a narrow entranceway, <b>jostling</b> one another on their way to a factory.<br><br>Which word or phrase in the text is closest in meaning to the word 'jammed'?", a:"b", exp:"The word jammed is closest in meaning to packed.", o:{a:"destroyed", b:"packed", c:"jostling", d:"narrow"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "42. It can be inferred from the passage that two thirds of the film Modern Times", a:"b", exp:"According to paragraph 3, 'Scenes of factory interiors account for only about one-third of the footage.' Therefore, about two thirds of the film must have been shot outside the factory.", o:{a:"is extremely unforgettable.", b:"takes place outside a factory.", c:"is more critical than the other third.", d:"entertains the audience more than the other third."} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "43. Look at the word 'biting' in the text below:<br><br>This <b>biting</b> tone of criticism, however, is not sustained throughout the film. It is replaced by a <b>gentle</b> note of satire. Chaplin preferred to entertain rather than <b>lecture</b> to the <b>audience</b>.<br><br>Which word or phrase in the text is most nearly OPPOSITE in meaning to the word 'biting'?", a:"b", exp:"The word biting is most nearly opposite in meaning to the word gentle. (Biting here means 'sharply critical.')", o:{a:"tone", b:"gentle", c:"lecture", d:"audience"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "44. Which of the following could best replace the phrase losing his mind in paragraph 3?", a:"c", exp:"The phrase going insane could best replace the phrase losing his mind.", o:{a:"Getting fired", b:"Doing his job", c:"Going insane", d:"Falling behind"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "45. The following sentence can be added to paragraph 3. 'All at once, this feeding device begins to malfunction.' Where would it best fit in the paragraph below?<br><br>Scenes of factory interiors account for only about one-third of the footage of Modern Times, but they contain some of the most pointed social commentary as well as the funniest comic situations. <b>(1)</b> No one who has seen the film can ever forget Chaplin vainly trying to keep pace with the fastmoving conveyor belt, almost losing his mind in the process. <b>(2)</b> Another popular scene features an automatic feeding machine brought to the assembly line so that workers need not interrupt their labor to eat. <b>(3)</b> It hurls food at Chaplin, who is strapped into his position on the assembly line and cannot escape. <b>(4)</b> This serves to illustrate people's utter helplessness in the face of machines that are meant to serve their basic needs.", a:"c", exp:"Kalimat sisipan ('All at once, this feeding device begins to malfunction.') membahas kerusakan mesin makan otomatis. Posisi terbaik adalah (3) karena mengikuti pengenalan alat tersebut di kalimat sebelumnya ('...automatic feeding machine...') dan mendahului penjelasan aksi malfungsi alatnya di kalimat setelahnya ('It hurls food at Chaplin...').", o:{a:"(1)", b:"(2)", c:"(3)", d:"(4)"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "46. Look at the word 'their' in the text below:<br><br>It hurls food at Chaplin, who is strapped into his position on the assembly line and cannot escape. This serves to illustrate <b>people's</b> utter helplessness in the face of <b>machines</b> that are meant to serve <b>their</b> basic <b>needs</b>.<br><br>Which word or phrase in the text does the word 'their' refer to?", a:"a", exp:"The word their refers to people's.", o:{a:"people's", b:"machines", c:"needs", d:"assembly line"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "47. According to the passage, the purpose of the scene involving the feeding machine is to show people's", a:"c", exp:"The last sentence of paragraph 3 states: 'This (the scene) serves to illustrate people's utter helplessness in the face of machines that are meant to serve their basic needs.'", o:{a:"ingenuity.", b:"adaptability.", c:"helplessness.", d:"independence."} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "48. The word utter in paragraph 3 is closest in meaning to which of the following?", a:"b", exp:"The word utter is closest in meaning to complete.", o:{a:"Notable", b:"Complete", c:"Regrettable", d:"Necessary"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "49. Look at the word 'faults' in the text below:<br><br>Clearly, Modern Times has its <b>faults</b>, but despite its <b>flaws</b>, it remains the best film treating technology within a social <b>context</b>. It does not offer a radical social <b>message</b>, but it does accurately reflect the <b>sentiments</b> of many who feel they are victims of an over-mechanized world.<br><br>Which word or phrase in the text is closest in meaning to the word 'faults'?", a:"a", exp:"The word faults is closest in meaning to flaws.", o:{a:"flaws", b:"context", c:"message", d:"sentiments"} },
            { section: "reading2", passageImg: "soal39sampai50section2.png", q: "50. The author would probably use all of the following words to describe the film Modern Times EXCEPT", a:"a", exp:"The film 'does not offer a radical social message' (paragraph 3) and so would not be considered 'revolutionary.' Paragraph 2 states that 'Chaplin preferred to entertain rather than lecture,' so it is 'entertaining.' Paragraph 3 mentions that people who have seen the film cannot forget certain scenes, so it is certainly 'memorable.' According to paragraph 2, the opening scene's 'biting tone ... is replaced by a gentle note of satire'; therefore, the author would consider the film 'satirical.'", o:{a:"revolutionary.", b:"entertaining.", c:"memorable.", d:"satirical."} }
        ];

        let score = 0;
        let answered = 0;
        let currentFilter = 'all';
        let currentIdx = 0; // The index relative to the FILTERED list
        const answeredIndices = new Set(); // Stores the ORIGINAL index from quizData

        // Helper to get filtered data with original indices preserved
        function getFilteredData() {
            return quizData
                .map((item, idx) => ({ ...item, originalIdx: idx }))
                .filter(item => currentFilter === 'all' || item.section === currentFilter);
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-area');
            container.innerHTML = '';
            
            const filtered = getFilteredData();
            const item = filtered[currentIdx];
            if (!item) return;

            const qDiv = document.createElement('div');
            qDiv.className = "quiz-item bg-white rounded-3xl p-8 shadow-sm border border-slate-100 animate-in fade-in duration-500";
            
            let sectionLabel = item.section === 'structure' ? 'Structure' : (item.section === 'reading' ? 'Reading 1' : 'Reading 2');
            let labelColor = item.section === 'structure' ? 'bg-indigo-100 text-indigo-700' : (item.section === 'reading' ? 'bg-emerald-100 text-emerald-700' : 'bg-cyan-100 text-cyan-700');
            
            let passageHtml = "";
            if (item.passageImg) {
                passageHtml = `
                    <div class="mb-4">
                        <img src="${item.passageImg}" alt="Reading Passage" class="passage-img" />
                    </div>
                `;
            }

            qDiv.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase ${labelColor}">${sectionLabel}</span>
                        <span class="text-slate-400 font-medium text-sm">#${currentIdx + 1} of ${filtered.length}</span>
                    </div>
                    ${item.originalIdx !== undefined ? `<span class="text-[10px] font-bold text-slate-300 uppercase">Original ID: ${item.originalIdx + 1}</span>` : ''}
                </div>
                
                ${passageHtml}

                <p class="text-xl font-semibold text-slate-800 mb-8 leading-relaxed">${item.q}</p>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="options-area">
                    ${['a','b','c','d'].map(letter => `
                        <button onclick="handleChoice(${item.originalIdx}, '${letter}')" 
                                class="option-btn text-left p-4 rounded-2xl border-2 border-slate-100 hover:border-indigo-200 hover:bg-indigo-50 flex items-center gap-4 group">
                            <span class="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-500 group-hover:bg-indigo-100 group-hover:text-indigo-600 uppercase text-xs">${letter}</span>
                            <span class="flex-1 font-medium text-slate-600">${item.o[letter]}</span>
                        </button>
                    `).join('')}
                </div>
                
                <div id="feedback-area" class="mt-8 hidden p-5 rounded-2xl border">
                    <p id="result-text" class="font-bold text-lg mb-1"></p>
                    <p id="exp-text" class="text-sm opacity-90"></p>
                </div>

                <div class="flex justify-between mt-12 pt-8 border-t border-slate-50">
                    <button onclick="prevQuestion()" class="px-8 py-3 bg-slate-100 rounded-2xl font-bold text-slate-600 hover:bg-slate-200 transition-colors ${currentIdx === 0 ? 'opacity-30 pointer-events-none' : ''}">
                        &larr; Sebelumnya
                    </button>
                    <button onclick="nextQuestion()" class="px-8 py-3 bg-indigo-600 rounded-2xl font-bold text-white shadow-lg shadow-indigo-200 hover:bg-indigo-700 transition-all ${currentIdx === filtered.length - 1 ? 'opacity-30 pointer-events-none' : ''}">
                        Selanjutnya &rarr;
                    </button>
                </div>
            `;
            container.appendChild(qDiv);
            renderNavigation();
        }

        function renderNavigation() {
            const navGrid = document.getElementById('nav-grid');
            if(!navGrid) return;
            navGrid.innerHTML = '';
            
            const filtered = getFilteredData();
            
            filtered.forEach((item, idx) => {
                const box = document.createElement('div');
                const isAnswered = answeredIndices.has(item.originalIdx);
                const isActive = idx === currentIdx;
                box.className = `nav-box ${isAnswered ? 'answered' : ''} ${isActive ? 'ring-4 ring-indigo-200 border-indigo-500 text-indigo-600' : ''}`;
                box.innerText = idx + 1;
                box.onclick = () => jumpToQuestion(idx);
                navGrid.appendChild(box);
            });
        }

        window.jumpToQuestion = function(idx) {
            currentIdx = idx;
            renderQuiz();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.nextQuestion = function() {
            const filtered = getFilteredData();
            if(currentIdx < filtered.length - 1) {
                currentIdx++;
                renderQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.prevQuestion = function() {
            if(currentIdx > 0) {
                currentIdx--;
                renderQuiz();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        window.handleChoice = function(originalIdx, choice) {
            const item = quizData[originalIdx];
            const optContainer = document.getElementById('options-area');
            const buttons = optContainer.querySelectorAll('button');
            const feedback = document.getElementById('feedback-area');
            const resultText = document.getElementById('result-text');
            const expText = document.getElementById('exp-text');

            buttons.forEach(b => b.classList.add('disabled'));

            const isCorrect = choice === item.a;
            if(isCorrect) {
                score++;
                buttons[['a','b','c','d'].indexOf(choice)].classList.add('correct');
                feedback.classList.add('bg-emerald-50', 'border-emerald-200', 'text-emerald-800');
                resultText.innerText = "Benar! ✨";
            } else {
                buttons[['a','b','c','d'].indexOf(choice)].classList.add('wrong');
                buttons[['a','b','c','d'].indexOf(item.a)].classList.add('correct');
                feedback.classList.add('bg-rose-50', 'border-rose-200', 'text-rose-800');
                resultText.innerText = `Salah ❌ (Jawaban: ${item.a.toUpperCase()})`;
            }

            expText.innerText = item.exp || "Jawaban ini didasarkan pada teks bacaan atau aturan tata bahasa yang berlaku.";
            feedback.classList.remove('hidden');
            
            if(!answeredIndices.has(originalIdx)) {
                answered++;
                answeredIndices.add(originalIdx);
                renderNavigation(); // Refresh grid to show progress
            }
            updateStats();
        }

        function updateStats() {
            const scoreEl = document.getElementById('score');
            const answeredEl = document.getElementById('answered');
            if(scoreEl) scoreEl.innerText = score;
            if(answeredEl) answeredEl.innerText = answered;
        }

        window.setFilter = function(f) {
            currentFilter = f;
            currentIdx = 0; // Reset to first page of new filter
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-600', 'text-white');
                btn.classList.add('bg-white', 'text-slate-600', 'border-slate-200');
            });
            event.target.classList.add('bg-indigo-600', 'text-white');
            event.target.classList.remove('bg-white', 'text-slate-600', 'border-slate-200');
            renderQuiz();
        }

        renderQuiz();
    </script>
</body>
</html>
